<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>📝 Registration Form</h1>
        <p class="subtitle">
            Fill in ALL your details below. Every field is validated so nothing goes wrong!
        </p>

        <form id="signupForm">
            <h2 class="section-title">👤 Personal Information</h2>
            <div class="form-group">
                <label for="fullName">Full Name <span class="required">*</span></label>
                <input type="text" id="fullName" data-validate="name" placeholder="e.g. John Doe">
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="dob">Date of Birth <span class="required">*</span></label>
                <input type="date" id="dob" data-validate="dob">
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="age">Age <span class="optional">(auto-calculated)</span></label>
                <input type="text" id="age" readonly placeholder="Will auto-calculate from DOB">
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="cnic">CNIC Number <span class="required">*</span></label>
                <input type="text" id="cnic" data-validate="cnic" placeholder="e.g. 42201-1234567-8">
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="nationality">Nationality <span class="required">*</span></label>
                <input type="text" id="nationality" data-validate="nationality" placeholder="e.g. Pakistani">
                <small class="error-message"></small>
            </div>
            <h2 class="section-title">📍 Address Information</h2>
            <div class="form-group">
                <label for="country">Country <span class="required">*</span></label>
                <select id="country" data-validate="country">
                    <option value="" disabled selected>-- Select your country --</option>
                    <option value="Pakistan">Pakistan</option>
                    <option value="India">India</option>
                    <option value="Bangladesh">Bangladesh</option>
                    <option value="Sri Lanka">Sri Lanka</option>
                    <option value="Nepal">Nepal</option>
                    <option value="Afghanistan">Afghanistan</option>
                    <option value="China">China</option>
                    <option value="USA">USA</option>
                    <option value="UK">United Kingdom</option>
                    <option value="Canada">Canada</option>
                    <option value="Australia">Australia</option>
                    <option value="UAE">United Arab Emirates</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Other">Other</option>
                </select>
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="province">Province / State <span class="required">*</span></label>
                <input type="text" id="province" data-validate="province" placeholder="e.g. Punjab, Sindh">
                <small class="error-message"></small>
            </div>
            <div class="form-group">
                <label for="district">District <span class="required">*</span></label>
                <input type="text" id="district" data-validate="district" placeholder="e.g. Lahore, Karachi">
                <small class="error-message"></small>
            </div>

            <!-- City -->
            <div class="form-group">
                <label for="city">City <span class="required">*</span></label>
                <input type="text" id="city" data-validate="city" placeholder="e.g. Gulberg, Saddar">
                <small class="error-message"></small>
            </div>
            <h2 class="section-title">📞 Contact Information</h2>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" data-validate="email" placeholder="e.g. john@example.com">
                <small class="error-message"></small>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone Number <span class="required">*</span></label>
                <input type="text" id="phone" data-validate="phone" placeholder="e.g. 03001234567">
                <small class="error-message"></small>
            </div>
            <h2 class="section-title">🔒 Security</h2>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password <span class="required">*</span></label>
                <input type="password" id="password" data-validate="password" placeholder="At least 6 characters, 1 uppercase, 1 number">
                <small class="error-message"></small>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                <input type="password" id="confirmPassword" data-validate="confirm" placeholder="Re-enter password">
                <small class="error-message"></small>
            </div>
            <button type="submit" id="submitBtn">Create Account</button>

        </form>

        <!-- Overall success/error message -->
        <div id="formMessage"></div>

    </div>

    <script src="app.js"></script>
</body>
</html>
