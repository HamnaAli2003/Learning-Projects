<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <!-- The screen — starts with "0" as initial value -->
        <input type="text" id="display" disabled value="0">

        <div class="buttons">
            <!-- ROW 1: Numbers 7-9 with ÷ (division) on the right -->
            <button data-value="7">7</button>
            <button data-value="8">8</button>
            <button data-value="9">9</button>
            <button data-value="/" class="operator">÷</button>

            <!-- ROW 2: Numbers 4-6 with × (multiplication) on the right -->
            <button data-value="4">4</button>
            <button data-value="5">5</button>
            <button data-value="6">6</button>
            <button data-value="*" class="operator">×</button>

            <!-- ROW 3: Numbers 1-3 with − (subtraction) on the right -->
            <button data-value="1">1</button>
            <button data-value="2">2</button>
            <button data-value="3">3</button>
            <button data-value="-" class="operator">−</button>

            <!-- ROW 4: C (clear), 0, . (decimal), + (addition) on the right -->
            <button data-value="C" class="clear-btn">C</button>
            <button data-value="0">0</button>
            <button data-value=".">.</button>
            <button data-value="+" class="operator">+</button>

            <!-- ROW 5: = (equals) spans all 4 columns at the bottom -->
            <button data-value="=" class="equals-btn">=</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
